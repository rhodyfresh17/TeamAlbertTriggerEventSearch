name: Trigger Event Scraper

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache the database to prevent duplicate alerts
      - name: Cache database
        uses: actions/cache@v4
        with:
          path: trigger_events.db
          key: trigger-events-db-${{ github.run_id }}
          restore-keys: |
            trigger-events-db-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "requests>=2.28.0" "PyYAML>=6.0"
          pip list | grep -E "requests|PyYAML"

          # Verify imports work
          python3 -c "import requests; import yaml; print('Dependencies OK')"

      - name: Setup config
        run: |
          cp config.example.yaml config.yaml

          # Show database status
          if [ -f trigger_events.db ]; then
            echo "Database found ($(stat -c%s trigger_events.db) bytes)"
          else
            echo "No existing database - first run"
          fi

      - name: Configure email
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          python3 -c "
          import yaml
          import os

          with open('config.yaml', 'r') as f:
              config = yaml.safe_load(f)

          sender = os.environ.get('SENDER_EMAIL', '')
          password = os.environ.get('EMAIL_PASSWORD', '')

          if sender and password:
              config['alerts']['email']['enabled'] = True
              config['alerts']['email']['sender_email'] = sender
              config['alerts']['email']['sender_password'] = password
              print('Email configured for:', sender)
          else:
              print('Email secrets not set - using file alerts only')

          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          "

      - name: Verify module loads
        run: |
          python3 -c "from src.main import TriggerEventMonitor; print('Module OK')"

      - name: Run scraper
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: |
          python -m src.main

      - name: Show database status
        if: always()
        run: |
          if [ -f trigger_events.db ]; then
            echo "Database size: $(stat -c%s trigger_events.db) bytes"
            python3 -c "
          import sqlite3
          conn = sqlite3.connect('trigger_events.db')
          cursor = conn.cursor()
          cursor.execute('SELECT COUNT(*) FROM events')
          print(f'Total events in database: {cursor.fetchone()[0]}')
          cursor.execute('SELECT COUNT(*) FROM seen_urls')
          print(f'Total URLs seen: {cursor.fetchone()[0]}')
          conn.close()
          "
          fi

      - name: Sync to Google Sheets
        if: success()
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ -n "$GOOGLE_SHEET_ID" ] && [ -n "$GOOGLE_SHEETS_CREDENTIALS" ]; then
            pip install google-api-python-client google-auth
            python3 sheets_sync.py --spreadsheet-id "$GOOGLE_SHEET_ID"
          else
            echo "Google Sheets not configured - skipping sync"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alerts-${{ github.run_number }}
          path: alerts/
          retention-days: 30
