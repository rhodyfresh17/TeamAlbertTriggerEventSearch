name: Trigger Event Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: |
          pip install requests pyyaml
          cp config.example.yaml config.yaml

          # Configure email using Python (handles special chars safely)
          python3 -c "
          import yaml
          import os

          with open('config.yaml', 'r') as f:
              config = yaml.safe_load(f)

          sender = os.environ.get('SENDER_EMAIL', '')
          password = os.environ.get('EMAIL_PASSWORD', '')

          if sender and password:
              config['alerts']['email']['enabled'] = True
              config['alerts']['email']['sender_email'] = sender
              config['alerts']['email']['sender_password'] = password
              print('Email configured for:', sender)
          else:
              print('Email secrets not set - using file alerts only')

          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          "

          python -m src.main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alerts-${{ github.run_number }}
          path: alerts/
          retention-days: 30
