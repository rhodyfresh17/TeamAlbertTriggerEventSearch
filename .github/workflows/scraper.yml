name: Trigger Event Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          pip install requests pyyaml
          cp config.example.yaml config.yaml

          # Configure email if secrets are set
          if [ -n "$SENDER_EMAIL" ] && [ -n "$EMAIL_PASSWORD" ]; then
            echo "Configuring email alerts..."
            # Use Python to safely update YAML (handles special chars)
            python3 << 'PYEOF'
import yaml
import os

with open('config.yaml', 'r') as f:
    config = yaml.safe_load(f)

config['alerts']['email']['enabled'] = True
config['alerts']['email']['sender_email'] = os.environ['SENDER_EMAIL']
config['alerts']['email']['sender_password'] = os.environ['EMAIL_PASSWORD']

with open('config.yaml', 'w') as f:
    yaml.dump(config, f, default_flow_style=False)

print("Email configured for:", os.environ['SENDER_EMAIL'])
PYEOF
          else
            echo "Email secrets not set - using file alerts only"
          fi

          python -m src.main

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alerts-${{ github.run_number }}
          path: alerts/
          retention-days: 30
