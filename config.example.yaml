# Data sources to scrape
sources:
  # RSS feeds from major PR/news wires
  rss_feeds:
    - name: "Business Wire"
      url: "https://feed.businesswire.com/rss/home/?rss=G1QFDERJXkJeEFpRWQ=="
      enabled: true

    - name: "PR Newswire - Business"
      url: "https://www.prnewswire.com/rss/news-releases-list.rss"
      enabled: true

    - name: "Globe Newswire"
      url: "https://www.globenewswire.com/RssFeed/orgclass/1/feedTitle/GlobeNewswire%20-%20News%20Releases"
      enabled: true

    # EIN Presswire - disabled (404)
    # Financewire - disabled (malformed XML)
    # FINSMES - disabled (403 blocked)

    # Industry-specific sources
    - name: "Nonprofit Times"
      url: "https://www.thenonprofittimes.com/feed/"
      enabled: true

    - name: "Nonprofit Quarterly"
      url: "https://nonprofitquarterly.org/feed/"
      enabled: true

    # Restaurant Business Magazine - disabled (malformed XML)

    - name: "QSR Magazine"
      url: "https://www.qsrmagazine.com/rss.xml"
      enabled: true

    # Franchise Times - disabled (429 rate limited)

    - name: "Franchise Wire"
      url: "https://www.franchisewire.com/feed/"
      enabled: true

    # Funding/Startup sources
    - name: "Crunchbase News"
      url: "https://news.crunchbase.com/feed/"
      enabled: true

    # VC News Daily - disabled (404)

    - name: "PEHub"
      url: "https://www.pehub.com/feed/"
      enabled: true

    # PE News - disabled (401 requires auth)

    # Healthcare sources
    - name: "Fierce Healthcare"
      url: "https://www.fiercehealthcare.com/rss/xml"
      enabled: true

    # Modern Healthcare - disabled (404)

    # Insurance sources
    # Insurance News Net - disabled (404)

    - name: "Insurance Journal"
      url: "https://www.insurancejournal.com/feed/"
      enabled: true

    # Insurance Business - disabled (403 blocked)

    # Construction sources
    - name: "Construction Dive"
      url: "https://www.constructiondive.com/feeds/news/"
      enabled: true

    # ENR (Engineering News-Record) - disabled (404)

    # Energy/Utilities sources
    - name: "Utility Dive"
      url: "https://www.utilitydive.com/feeds/news/"
      enabled: true

    # Oil & Gas Journal - disabled (malformed XML)

    - name: "Solar Power World"
      url: "https://www.solarpowerworldonline.com/feed/"
      enabled: true

    # Hospitality sources
    - name: "Hotel Management"
      url: "https://www.hotelmanagement.net/rss.xml"
      enabled: true

    # Hospitality Net - disabled (404)

    # Field Services/HVAC sources
    # ACHR News - disabled (malformed XML)
    # Contracting Business - disabled (404)

    # Additional Healthcare
    # Becker's Hospital Review - disabled (403 blocked)

    # Additional Nonprofit
    # Chronicle of Philanthropy - disabled (malformed XML)

    # Mid-Market Focus
    # Middle Market Growth - disabled (malformed XML)

  # Google News RSS (requires specific search queries)
  google_news:
    enabled: true
    base_url: "https://news.google.com/rss/search?q="

# Alert configuration
alerts:
  # Email alerts (enabled via GitHub secrets)
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: "your-email@gmail.com"
    sender_password: ""
    recipient_emails:
      - "mwjacobs3@gmail.com"

  # Slack alerts
  slack:
    enabled: false
    webhook_url: ""

  # Desktop notifications (disabled for CI)
  desktop:
    enabled: false

  # File-based alerts (always enabled as backup)
  file:
    enabled: true
    output_dir: "alerts"

# Scraper settings
scraper:
  # How often to check (in minutes)
  check_interval: 30

  # Request timeout (seconds)
  timeout: 30

  # Delay between requests (seconds) - be respectful to servers
  request_delay: 2

  # User agent string
  user_agent: "Mozilla/5.0 (compatible; SalesTerritoryBot/1.0)"

  # Maximum age of news to consider (hours)
  max_age_hours: 72

  # Database file for tracking seen items
  database: "trigger_events.db"
