# Data sources to scrape
sources:
  # RSS feeds from major PR/news wires
  rss_feeds:
    - name: "Business Wire"
      url: "https://feed.businesswire.com/rss/home/?rss=G1QFDERJXkJeEFpRWQ=="
      enabled: true

    # PR Newswire - category-specific feeds for better coverage
    - name: "PR Newswire"
      url: "https://www.prnewswire.com/rss/news-releases-list.rss"
      enabled: true

    - name: "PR Newswire - General Business"
      url: "https://www.prnewswire.com/rss/general-business-latest-news.rss"
      enabled: true

    - name: "PR Newswire - Financial Services"
      url: "https://www.prnewswire.com/rss/financial-services-latest-news.rss"
      enabled: true

    - name: "PR Newswire - Heavy Industry"
      url: "https://www.prnewswire.com/rss/heavy-industry-and-manufacturing-latest-news.rss"
      enabled: true

    # Major news sources
    - name: "Reuters Business"
      url: "https://feeds.reuters.com/reuters/businessNews"
      enabled: true

    - name: "Business Insider"
      url: "https://feeds.businessinsider.com/custom/all"
      enabled: true

    # Alternative press release sources
    - name: "1888 Press Release"
      url: "https://www.1888pressrelease.com/rss/today.xml"
      enabled: true

    # Newswire.com feeds
    - name: "Newswire - Latest"
      url: "https://www.newswire.com/newsroom/rss"
      enabled: true

    - name: "Globe Newswire"
      url: "https://www.globenewswire.com/RssFeed/orgclass/1/feedTitle/GlobeNewswire%20-%20News%20Releases"
      enabled: true

    # EIN Presswire / EIN News - disabled (404 - feeds no longer available)
    # Regional Business Journals - disabled (403 - blocks automated access)

    # Canadian Business News
    - name: "CBC Business"
      url: "https://rss.cbc.ca/lineup/business.xml"
      enabled: true

    - name: "Financial Post"
      url: "https://financialpost.com/feed"
      enabled: true

    # Financewire - disabled (malformed XML)
    # FINSMES - moved to dedicated scraper (see finsmes section below)

    # Industry-specific sources
    - name: "Nonprofit Times"
      url: "https://www.thenonprofittimes.com/feed/"
      enabled: true

    - name: "Nonprofit Quarterly"
      url: "https://nonprofitquarterly.org/feed/"
      enabled: true

    - name: "ProPublica - Nonprofits"
      url: "https://www.propublica.org/feeds/propublica/main"
      enabled: true

    # Restaurant Business Magazine - disabled (malformed XML)

    - name: "QSR Magazine"
      url: "https://www.qsrmagazine.com/rss.xml"
      enabled: true

    # Franchise Times - disabled (429 rate limited)

    # Franchise Wire - disabled (empty/invalid response)

    # Funding/Startup/PE/VC sources
    - name: "Crunchbase News"
      url: "https://news.crunchbase.com/feed/"
      enabled: true

    - name: "VC News Daily"
