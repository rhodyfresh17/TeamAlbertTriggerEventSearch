# Sales Territory Trigger Event Scraper Configuration
# Customize this file to match your sales territory

# Define your sales territory
territory:
  name: "East Coast & Eastern Canada"

  # Companies to specifically monitor (add your target accounts)
  target_companies:
    # Add your target accounts here
    # - "Company Name"

  # Geographic regions to monitor
  regions:
    # US States
    - "New York"
    - "Massachusetts"
    - "New Jersey"
    - "Virginia"
    - "Pennsylvania"
    - "North Carolina"
    - "South Carolina"
    - "Ohio"
    - "West Virginia"
    - "Washington DC"
    - "District of Columbia"
    - "Maryland"
    - "Delaware"
    - "Maine"
    - "Rhode Island"
    - "Connecticut"
    - "New Hampshire"
    - "Vermont"
    # Canadian Provinces
    - "Toronto"
    - "Ontario"
    - "Quebec"
    - "New Brunswick"
    - "Newfoundland"
    - "Labrador"

  # Major cities in territory (for more precise matching)
  cities:
    - "New York City"
    - "NYC"
    - "Boston"
    - "Philadelphia"
    - "Toronto"
    - "Montreal"
    - "Charlotte"
    - "Pittsburgh"
    - "Baltimore"
    - "Richmond"
    - "Columbus"
    - "Cleveland"
    - "Hartford"
    - "Providence"
    - "Newark"
    - "Raleigh"
    - "Durham"
    - "Halifax"
    - "Quebec City"

  # Industries to focus on (target verticals)
  industries:
    # Healthcare
    - "Healthcare"
    - "Health System"
    - "Hospital"
    - "Medical"
    - "Health Services"
    # Nonprofit
    - "Nonprofit"
    - "Non-profit"
    - "Foundation"
    - "Charity"
    - "NGO"
    # Hospitality
    - "Hospitality"
    - "Hotel"
    - "Resort"
    - "Lodging"
    # Restaurant/Franchise
    - "Restaurant"
    - "Franchise"
    - "Food Service"
    - "QSR"
    - "Fast Food"
    - "Dining"
    # Construction
    - "Construction"
    - "General Contractor"
    - "Builder"
    - "Engineering"
    - "Infrastructure"
    # Field Services
    - "Field Services"
    - "HVAC"
    - "Plumbing"
    - "Electrical"
    - "Facilities"
    - "Property Management"
    - "Maintenance"
    # Energy
    - "Energy"
    - "Utilities"
    - "Power"
    # Renewables
    - "Renewable"
    - "Solar"
    - "Wind Energy"
    - "Clean Energy"
    - "Green Energy"
    # Oil & Gas
    - "Oil"
    - "Gas"
    - "Petroleum"
    - "Drilling"
    - "Pipeline"
    # Financial Services (Insurance only - no banks)
    - "Insurance"
    - "Underwriting"
    - "Claims"
    - "Insurer"

  # Industries/companies to EXCLUDE from results
  excluded_industries:
    - "Bank"
    - "Banking"
    - "Credit Union"
    - "Savings Bank"
    - "Federal Reserve"
    - "Mortgage Lender"

  # Company size filters (target mid-market private companies)
  company_filters:
    # Avoid public companies
    exclude_public_companies: true
    public_company_indicators:
      - "NYSE"
      - "NASDAQ"
      - "stock exchange"
      - "publicly traded"
      - "ticker symbol"
      - "(NYSE:"
      - "(NASDAQ:"
      - "common stock"
      - "shareholders"
      - "SEC filing"
      - "Fortune 500"
      - "Fortune 100"
      - "S&P 500"
      - "billion dollar"
      - "$B"
      - "market cap"

    # Known large public companies to exclude from M&A alerts
    excluded_public_companies:
      - "Boston Scientific"
      - "Johnson & Johnson"
      - "Medtronic"
      - "Abbott"
      - "UnitedHealth"
      - "CVS Health"
      - "Cigna"
      - "Humana"
      - "HCA Healthcare"
      - "McKesson"
      - "AmerisourceBergen"
      - "Cardinal Health"
      - "Anthem"
      - "Centene"
      - "Walgreens"
      - "Amazon"
      - "Google"
      - "Microsoft"
      - "Apple"
      - "Oracle"
      - "Salesforce"

    # Target company size
    min_employees: 20
    max_employees: 2000
    min_revenue_millions: 20
    max_revenue_millions: 500

    # Keywords indicating target size
    target_size_indicators:
      - "mid-market"
      - "middle market"
      - "mid-size"
      - "regional"
      - "growing"
      - "private company"
      - "privately held"
      - "family-owned"
      - "employee-owned"

# Keywords to search for trigger events
keywords:
  executive_hires:
    - "CFO"
    - "Chief Financial Officer"
    - "VP Finance"
    - "Vice President Finance"
    - "Finance Director"
    - "Controller"
    - "Treasurer"
    - "Head of Finance"
    - "Finance Lead"
    - "named CFO"
    - "appointed CFO"
    - "joins as CFO"
    - "new CFO"
    - "hires CFO"

  mergers_acquisitions:
    - "acquisition"
    - "acquired"
    - "acquires"
    - "merger"
    - "merged"
    - "M&A"
    - "purchase agreement"
    - "definitive agreement"
    - "strategic acquisition"
    - "buyout"
    - "takeover"
    - "to acquire"
    - "has acquired"
    - "completes acquisition"
    - "announces acquisition"

  funding_events:
    - "series A"
    - "series B"
    - "series C"
    - "funding round"
    - "raises"
    - "raised"
    - "investment"
    - "venture capital"
    - "private equity"
    - "IPO"
    - "going public"

# Data sources to scrape
sources:
  # RSS feeds from major PR/news wires
  rss_feeds:
    - name: "Business Wire"
      url: "https://feed.businesswire.com/rss/home/?rss=G1QFDERJXkJeEFpRWQ=="
      enabled: true

    - name: "PR Newswire - Business"
      url: "https://www.prnewswire.com/rss/news-releases-list.rss"
      enabled: true

    - name: "Globe Newswire"
      url: "https://www.globenewswire.com/RssFeed/orgclass/1/feedTitle/GlobeNewswire%20-%20News%20Releases"
      enabled: true

    - name: "EIN Presswire"
      url: "https://www.einpresswire.com/rss/world"
      enabled: true

    - name: "Financewire"
      url: "https://financewire.net/feed/"
      enabled: true

    - name: "FINSMES"
      url: "https://www.finsmes.com/feed"
      enabled: true

    # Industry-specific sources
    - name: "Nonprofit Times"
      url: "https://www.thenonprofittimes.com/feed/"
      enabled: true

    - name: "Nonprofit Quarterly"
      url: "https://nonprofitquarterly.org/feed/"
      enabled: true

    - name: "Restaurant Business Magazine"
      url: "https://www.restaurantbusinessonline.com/rss.xml"
      enabled: true

  # Google News RSS (requires specific search queries)
  google_news:
    enabled: true
    base_url: "https://news.google.com/rss/search?q="

# Alert configuration
alerts:
  # Email alerts (enabled via GitHub secrets)
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: "your-email@gmail.com"
    sender_password: ""
    recipient_emails:
      - "mwjacobs3@gmail.com"

  # Slack alerts
  slack:
    enabled: false
    webhook_url: ""

  # Desktop notifications (disabled for CI)
  desktop:
    enabled: false

  # File-based alerts (always enabled as backup)
  file:
    enabled: true
    output_dir: "alerts"

# Scraper settings
scraper:
  # How often to check (in minutes)
  check_interval: 30

  # Request timeout (seconds)
  timeout: 30

  # Delay between requests (seconds) - be respectful to servers
  request_delay: 2

  # User agent string
  user_agent: "Mozilla/5.0 (compatible; SalesTerritoryBot/1.0)"

  # Maximum age of news to consider (hours)
  max_age_hours: 72

  # Database file for tracking seen items
  database: "trigger_events.db"
