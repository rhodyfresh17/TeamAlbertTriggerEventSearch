      url: "https://skift.com/feed/"
      enabled: true

    # Travel Weekly - disabled (404)

    # Airlines & Aviation sources
    - name: "Simple Flying"
      url: "https://simpleflying.com/feed/"
      enabled: true

    # FlightGlobal - disabled (404)
    # Aero-News Network - disabled (403)

  # Google News RSS (requires specific search queries)
  google_news:
    enabled: true
    base_url: "https://news.google.com/rss/search?q="

# Alert configuration
alerts:
  # Email alerts (enabled via GitHub secrets)
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: "your-email@gmail.com"
    sender_password: ""
    recipient_emails:
      - "mwjacobs3@gmail.com"

  # Slack alerts
  slack:
    enabled: false
    webhook_url: ""

  # Desktop notifications (disabled for CI)
  desktop:
    enabled: false

  # File-based alerts (always enabled as backup)
  file:
    enabled: true
    output_dir: "alerts"

# Scraper settings
scraper:
  # How often to check (in minutes)
  check_interval: 30

  # Request timeout (seconds)
  timeout: 30

  # Delay between requests (seconds) - be respectful to servers
  request_delay: 2

  # User agent string
  user_agent: "Mozilla/5.0 (compatible; SalesTerritoryBot/1.0)"

  # Maximum age of news to consider (hours) - 7 days
  max_age_hours: 168

  # Database file for tracking seen items
  database: "trigger_events.db"

# Job site search for companies hiring finance leaders
job_search:
  enabled: true

  # Job titles to search for (indicates company needs financial leadership)
  titles:
    # Executive level
    - "CFO"
    - "Chief Financial Officer"
    - "VP Finance"
    - "Vice President Finance"
    - "Head of Finance"
    # Director level
    - "Controller"
    - "Finance Director"
    - "Director of Finance"
    - "Director of Accounting"
    - "Accounting Director"
    # Manager level
    - "Accounting Manager"
    - "Finance Manager"
    - "Controller Manager"
    # Senior individual contributors
    - "Senior Accountant"
    - "Staff Accountant"
    - "Senior Financial Analyst"
    - "Accountant"

  # Locations to search (within your territory)
  locations:
    - "New York, NY"
    - "Boston, MA"
    - "Philadelphia, PA"
    - "New Jersey"
    - "Connecticut"
    - "Maryland"
    - "Virginia"
    - "Washington DC"
    - "North Carolina"
    - "Toronto, ON"
    - "Montreal, QC"

  # Job boards to search (enable/disable each)
  boards:
    indeed: true
    ziprecruiter: true
    simplyhired: true
    google_jobs: true
    ladders: true        # Executive jobs ($100K+)
    cfo_com: true        # CFO-specific news and jobs
