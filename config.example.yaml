    # Google Alerts RSS feeds for LinkedIn CFO/finance hires
    # To set up: Go to https://www.google.com/alerts, create alert with query,
    # select "RSS feed" as delivery method, then paste the feed URL below.
    # These catch LinkedIn announcements faster than periodic Google News scrapes.
    #
    # Example alerts to create:
    #   site:linkedin.com "new CFO"
    #   site:linkedin.com "appointed CFO"
    #   site:linkedin.com "Chief Financial Officer" "excited to announce"
    #   site:linkedin.com "VP Finance" "joined"
    #   site:linkedin.com "Head of Finance" "new role"
    #
    # - name: "Google Alert - LinkedIn CFO"
    #   url: "https://www.google.com/alerts/feeds/YOUR_ALERT_ID/YOUR_FEED_ID"
    #   enabled: true
    #
    # - name: "Google Alert - LinkedIn CFO Appointed"
    #   url: "https://www.google.com/alerts/feeds/YOUR_ALERT_ID/YOUR_FEED_ID"
    #   enabled: true
    #
    # - name: "Google Alert - LinkedIn Chief Financial Officer"
    #   url: "https://www.google.com/alerts/feeds/YOUR_ALERT_ID/YOUR_FEED_ID"
    #   enabled: true
    #
    # - name: "Google Alert - LinkedIn VP Finance"
    #   url: "https://www.google.com/alerts/feeds/YOUR_ALERT_ID/YOUR_FEED_ID"
    #   enabled: true
    #
    # - name: "Google Alert - LinkedIn Head of Finance"
    #   url: "https://www.google.com/alerts/feeds/YOUR_ALERT_ID/YOUR_FEED_ID"
    #   enabled: true

  # Google News RSS (requires specific search queries)
  google_news:
    enabled: true
    base_url: "https://news.google.com/rss/search?q="

  # FinSMEs - Startup funding and M&A news (dedicated scraper with browser headers)
  finsmes:
    enabled: true
    url: "https://www.finsmes.com/feed"

  # Bing News API (complements Google News - surfaces different results)
  # Free tier: 1,000 calls/month at https://www.microsoft.com/en-us/bing/apis/bing-news-search-api
  bing_news:
    enabled: false  # Set to true and add API key to enable
    api_key: ""     # Your Bing Search API key
    endpoint: "https://api.bing.microsoft.com/v7.0/news/search"

# Alert configuration
alerts:
  # Email alerts (enabled via GitHub secrets)
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: "your-email@gmail.com"
    sender_password: ""
    recipient_emails:
      - "mwjacobs3@gmail.com"

  # Slack alerts
  slack:
    enabled: false
    webhook_url: ""

  # Desktop notifications (disabled for CI)
  desktop:
    enabled: false

  # File-based alerts (always enabled as backup)
  file:
    enabled: true
    output_dir: "alerts"

# Scraper settings
scraper:
  # How often to check (in minutes)
  check_interval: 30

  # Request timeout (seconds)
  timeout: 30

  # Delay between requests (seconds) - be respectful to servers
  request_delay: 2

  # User agent string
  user_agent: "Mozilla/5.0 (compatible; SalesTerritoryBot/1.0)"

  # Maximum age of news to consider (hours) - 7 days
  max_age_hours: 168

  # Database file for tracking seen items
  database: "trigger_events.db"

# Job site search for companies hiring finance leaders
job_search:
  enabled: true

  # Job titles to search for (indicates company needs financial leadership)
  titles:
    # Executive level - Finance
    - "CFO"
    - "Chief Financial Officer"
    - "VP Finance"
    - "Vice President Finance"
    - "Head of Finance"
    # Executive level - Operations (signals company scaling)
    - "COO"
    - "Chief Operating Officer"
    - "VP Operations"
    - "Vice President Operations"
    - "Chief Revenue Officer"
    - "CRO"
    # Director level
    - "Controller"
    - "Finance Director"
    - "Director of Finance"
    - "Director of Accounting"
    - "Accounting Director"
    - "Director of Operations"
    # Manager level
    - "Accounting Manager"
    - "Finance Manager"
    - "Controller Manager"
    # Senior individual contributors
    - "Senior Accountant"
    - "Staff Accountant"
    - "Senior Financial Analyst"
    - "Accountant"

  # Locations to search (within your territory)
  locations:
    - "New York, NY"
    - "Boston, MA"
    - "Philadelphia, PA"
    - "New Jersey"
    - "Connecticut"
    - "Maryland"
    - "Virginia"
    - "Washington DC"
    - "North Carolina"
    - "Toronto, ON"
    - "Montreal, QC"

  # Job boards to search (enable/disable each)
  boards:
    indeed: true
    ziprecruiter: true
    simplyhired: true
    google_jobs: true
    ladders: true        # Executive jobs ($100K+)
    cfo_com: true        # CFO-specific news and jobs
